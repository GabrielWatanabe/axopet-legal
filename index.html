<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AxôPet — Central de informações</title>
  <meta name="description" content="AxôPet — adote seu novo melhor amigo. Política de privacidade, termos de uso e suporte." />
  <style>
    :root{--brand:#C25B4C;--brand-light:#D67E6E;--bg:#FAF7F5;--ink:#23201f;--muted:#8a817c;--tint:#FBEEE9;--card:#fff}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.65}
    a{color:var(--brand);text-decoration:none}
    a:hover{text-decoration:underline}
    .hero{background:linear-gradient(135deg,var(--brand-light),var(--brand));color:#fff;padding:56px 24px 72px;text-align:center}
    .brand{display:inline-flex;align-items:center;gap:12px;color:#fff}
    .brand:hover{text-decoration:none}
    .logo{width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center}
    .logo svg{width:34px;height:34px}
    .brand-name{font-size:32px;font-weight:800;letter-spacing:-.5px}
    .tagline{margin:14px 0 0;font-size:15px;color:rgba(255,255,255,.9)}
    .wrap{max-width:560px;margin:-40px auto 0;padding:0 16px 64px}
    .links{background:var(--card);border-radius:18px;box-shadow:0 10px 40px rgba(80,30,20,.10);overflow:hidden}
    .link-row{display:flex;align-items:center;gap:14px;padding:20px 24px;border-bottom:1px solid #f1ebe8;color:var(--ink);font-size:16px;font-weight:600}
    .link-row:last-child{border-bottom:none}
    .link-row:hover{background:var(--tint);text-decoration:none}
    .link-ico{width:40px;height:40px;border-radius:12px;background:var(--tint);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .link-row .chev{margin-left:auto;color:var(--muted)}
    .site-footer{text-align:center;color:var(--muted);font-size:13px;padding:8px 16px 48px}
    .site-footer .muted{color:#b7afaa;margin-top:6px}
    @media(max-width:560px){.hero{padding:44px 20px 60px}.brand-name{font-size:28px}}
  </style>
</head>
<body>
  <header class="hero">
    <span class="brand">
      <span class="logo">
        <svg viewBox="0 0 512 512" aria-hidden="true" fill="#fff"><g transform="translate(0,-22)"><ellipse cx="256" cy="338" rx="100" ry="84"/><g transform="rotate(-22 150 240)"><ellipse cx="150" cy="240" rx="35" ry="47"/></g><g transform="rotate(-8 212 183)"><ellipse cx="212" cy="183" rx="34" ry="49"/></g><g transform="rotate(8 300 183)"><ellipse cx="300" cy="183" rx="34" ry="49"/></g><g transform="rotate(22 362 240)"><ellipse cx="362" cy="240" rx="35" ry="47"/></g></g></svg>
      </span>
      <span class="brand-name">AxôPet</span>
    </span>
    <p class="tagline">Adote seu novo melhor amigo</p>
  </header>

  <div class="wrap">
    <nav class="links">
      <a class="link-row" href="./privacy.html"><span class="link-ico">🔒</span> Política de Privacidade <span class="chev">›</span></a>
      <a class="link-row" href="./terms.html"><span class="link-ico">📄</span> Termos de Uso <span class="chev">›</span></a>
      <a class="link-row" href="./delete-account.html"><span class="link-ico">🗑️</span> Excluir minha conta <span class="chev">›</span></a>
      <a class="link-row" href="mailto:contato@axopetapp.com"><span class="link-ico">✉️</span> Falar com o suporte <span class="chev">›</span></a>
    </nav>
  </div>

  <footer class="site-footer">
    <p>© 2026 AxôPet · Todos os direitos reservados</p>
    <p class="muted">contato@axopetapp.com</p>
  </footer>
</body>
</html>
